name: Bridge release

on:
  workflow_dispatch:
  push:
    tags:
      - 'bridge-mode-*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Enable desktop platforms
        shell: pwsh
        run: |
          cd app
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Build Android APK
        shell: pwsh
        run: |
          cd app
          flutter build apk --release

      - name: Build Windows EXE
        shell: pwsh
        run: |
          cd app
          flutter build windows --release

      - name: Sign Windows artifacts
        if: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path .\release-artifacts\windows | Out-Null
          $certPath = Join-Path $env:GITHUB_WORKSPACE 'windows-cert.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          ./scripts/sign_windows.ps1 -BuildDir "app/build/windows/x64/runner/Release" -CertificatePath $certPath -Password $env:WINDOWS_CERTIFICATE_PASSWORD -OutputDir "release-artifacts/windows"

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts/android, release-artifacts/windows | Out-Null
          Copy-Item app/build/app/outputs/flutter-apk/app-release.apk -Destination release-artifacts/android/localsend-bridge.apk -Force
          if (Test-Path "app/build/windows/x64/runner/Release") {
            Copy-Item "app/build/windows/x64/runner/Release/*" -Destination "release-artifacts/windows" -Recurse -Force
            $mainExe = Get-ChildItem -Path "app/build/windows/x64/runner/Release" -File -Filter *.exe | Select-Object -First 1
            if ($mainExe) {
              Copy-Item $mainExe.FullName -Destination "release-artifacts/windows/localsend-bridge.exe" -Force
            }
          }

      - name: Generate download landing page
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $html = @"
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>LocalSend Bridge Downloads</title>
            <style>
              body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #0f172a; color: #f8fafc; }
              .card { max-width: 720px; margin: 4rem auto; padding: 2rem; background: #111827; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,.3); }
              .button { display: inline-block; margin-right: 1rem; margin-top: 1rem; padding: 0.9rem 1.2rem; border-radius: 999px; background: #2563eb; color: white; text-decoration: none; font-weight: 700; }
              .button.secondary { background: #16a34a; }
              .muted { color: #cbd5e1; line-height: 1.6; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>LocalSend Bridge downloads</h1>
              <p class="muted">Pick the build for your device.</p>
              <a class="button" href="https://github.com/Godszeal2/localsend/releases/download/$tag/localsend-bridge.exe">Download Windows EXE</a>
              <a class="button secondary" href="https://github.com/Godszeal2/localsend/releases/download/$tag/localsend-bridge.apk">Download APK</a>
            </div>
          </body>
          </html>
          "@
          Set-Content -Path release-artifacts/download.html -Value $html -Encoding UTF8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-release-artifacts
          path: release-artifacts/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'bridge-mode-0.1' }}
          name: Bridge workflow build
          body: |
            Download the Android APK and Windows build output for the bridge/screen-share workflow.

            [Download Windows EXE](https://github.com/Godszeal2/localsend/releases/download/${{ github.ref_name }}/localsend-bridge.exe)
            [Download APK](https://github.com/Godszeal2/localsend/releases/download/${{ github.ref_name }}/localsend-bridge.apk)

            You can also open the landing page asset for the same links.
          files: |
            release-artifacts/android/localsend-bridge.apk
            release-artifacts/windows/**
            release-artifacts/download.html
