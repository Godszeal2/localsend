name: Bridge release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create, for example bridge-mode-0.1. Leave blank to use bridge-mode-<run_number>."
        required: false
        type: string
      build_android:
        description: "Build and publish the Android APK. Disable this to rerun only the Windows build."
        required: false
        default: true
        type: boolean
  push:
    tags:
      - 'bridge-mode-*'

permissions:
  contents: write

jobs:
  build-android:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Enable desktop platforms
        run: |
          cd app
          flutter config --enable-linux-desktop
          flutter pub get

      - name: Create temporary Android signing key
        run: |
          keytool -genkeypair -v \
            -keystore app/android/bridge-release.jks \
            -storepass bridge-release \
            -keypass bridge-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias bridge \
            -dname "CN=Bridge Release, OU=CI, O=ZealBridge, L=CI, S=CI, C=US" \
            -noprompt
          cat > app/android/key.properties <<'EOF'
          storePassword=bridge-release
          keyPassword=bridge-release
          keyAlias=bridge
          storeFile=../bridge-release.jks
          EOF

      - name: Build Android APK
        run: |
          cd app
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  build-windows:
    runs-on: windows-2022
    steps:
      - name: Fix long file paths
        run: git config --system core.longpaths true

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Enable desktop platforms
        shell: pwsh
        run: |
          cd app
          flutter config --enable-windows-desktop
          flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          cd app
          $env:CMAKE_GENERATOR = "Visual Studio 17 2022"
          $env:CMAKE_GENERATOR_PLATFORM = "x64"
          flutter build windows --release

      - name: Prepare Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows-dist | Out-Null
          Copy-Item app/build/windows/x64/runner/Release/* windows-dist -Recurse -Force
          if (Test-Path "windows-dist/zealbridge.exe") {
            Rename-Item -Path "windows-dist/zealbridge.exe" -NewName "ZealBridge.exe" -Force
          } elseif (Test-Path "windows-dist/localsend_bridge.exe") {
            Rename-Item -Path "windows-dist/localsend_bridge.exe" -NewName "ZealBridge.exe" -Force
          }
          Compress-Archive -Path windows-dist/* -DestinationPath ZealBridge-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ZealBridge-Windows.zip
          retention-days: 14

  publish-release:
    needs: [build-android, build-windows]
    if: ${{ always() && needs.build-windows.result == 'success' && (needs.build-android.result == 'success' || needs.build-android.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release_info
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="bridge-mode-${{ github.run_number }}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        if: ${{ needs.build-android.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts/windows

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          mkdir -p release-artifacts/android release-artifacts/windows
          test -f release-artifacts/windows/ZealBridge-Windows.zip
          if [[ -f release-artifacts/android/app-release.apk ]]; then
            cp release-artifacts/android/app-release.apk release-artifacts/android/ZealBridge.apk
            echo "android_asset=release-artifacts/android/ZealBridge.apk" >> "$GITHUB_OUTPUT"
            printf 'android_link=%s\n' '<a class="button secondary" href="https://github.com/Godszeal2/localsend/releases/download/${{ steps.release_info.outputs.tag }}/ZealBridge.apk">Download APK</a>' >> "$GITHUB_OUTPUT"
            echo "release_body=Download the Android APK or Windows build archive for the bridge/screen-share workflow." >> "$GITHUB_OUTPUT"
          else
            echo "android_asset=" >> "$GITHUB_OUTPUT"
            echo "android_link=" >> "$GITHUB_OUTPUT"
            echo "release_body=Download the Windows build archive for the bridge/screen-share workflow." >> "$GITHUB_OUTPUT"
          fi

      - name: Generate download landing page
        run: |
          cat > release-artifacts/download.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>ZealBridge downloads</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #f8fafc; }
              .card { max-width: 720px; margin: 4rem auto; padding: 2rem; background: #111827; border-radius: 16px; }
              .button { display: inline-block; margin: 1rem 1rem 0 0; padding: 0.9rem 1.2rem; border-radius: 999px; background: #2563eb; color: white; text-decoration: none; font-weight: 700; }
              .button.secondary { background: #16a34a; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>ZealBridge downloads</h1>
              <p>Choose your build.</p>
              <a class="button" href="https://github.com/Godszeal2/localsend/releases/download/${{ steps.release_info.outputs.tag }}/ZealBridge-Windows.zip">Download Windows ZIP</a>
              ${{ steps.assets.outputs.android_link }}
            </div>
          </body>
          </html>
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Bridge workflow build ${{ steps.release_info.outputs.tag }}
          body: |
            ${{ steps.assets.outputs.release_body }}

            [Download Windows ZIP](https://github.com/Godszeal2/localsend/releases/download/${{ steps.release_info.outputs.tag }}/ZealBridge-Windows.zip)
            ${{ needs.build-android.result == 'success' && format('[Download APK](https://github.com/Godszeal2/localsend/releases/download/{0}/ZealBridge.apk)', steps.release_info.outputs.tag) || '' }}
          files: |
            release-artifacts/windows/ZealBridge-Windows.zip
            release-artifacts/download.html
            ${{ steps.assets.outputs.android_asset }}
