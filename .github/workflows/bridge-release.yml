name: Bridge release

on:
  workflow_dispatch:
  push:
    tags:
      - 'bridge-mode-*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Enable desktop platforms
        shell: pwsh
        run: |
          cd app
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Build Android APK
        shell: pwsh
        run: |
          cd app
          flutter build apk --release

      - name: Build Windows EXE
        shell: pwsh
        run: |
          cd app
          flutter build windows --release

      - name: Sign Windows artifacts
        if: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path .\release-artifacts\windows | Out-Null
          $certPath = Join-Path $env:GITHUB_WORKSPACE 'windows-cert.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          ./scripts/sign_windows.ps1 -BuildDir "app/build/windows/x64/runner/Release" -CertificatePath $certPath -Password $env:WINDOWS_CERTIFICATE_PASSWORD -OutputDir "release-artifacts/windows"

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts/android, release-artifacts/windows | Out-Null
          Copy-Item app/build/app/outputs/flutter-apk/app-release.apk -Destination release-artifacts/android/localsend-bridge.apk -Force
          if (Test-Path "app/build/windows/x64/runner/Release") {
            Copy-Item "app/build/windows/x64/runner/Release/*" -Destination "release-artifacts/windows" -Recurse -Force
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-release-artifacts
          path: release-artifacts/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'bridge-mode-0.1' }}
          name: Bridge workflow build
          body: |
            Download the Android APK and Windows build output for the bridge/screen-share workflow.

            - Android APK: localsend-bridge.apk
            - Windows executable: localsend-bridge.exe (when signing is configured)
          files: |
            release-artifacts/android/localsend-bridge.apk
            release-artifacts/windows/**
