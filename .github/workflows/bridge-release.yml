name: Bridge release

on:
  workflow_dispatch:
  push:
    tags:
      - 'bridge-mode-*'

jobs:
  build-windows-and-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses

      - name: Install Android build tools
        run: sdkmanager "platform-tools" "platforms;android-33" "build-tools;34.0.0"

      - name: Enable desktop platforms
        run: |
          cd app
          flutter config --enable-windows-desktop
          flutter config --enable-linux-desktop
          flutter config --enable-macos-desktop
          flutter pub get

      - name: Build Android APK
        run: |
          cd app
          flutter build apk --release

      - name: Build Windows EXE
        run: |
          cd app
          flutter build windows --release

      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts/android release-artifacts/windows
          cp app/build/app/outputs/flutter-apk/app-release.apk release-artifacts/android/localsend-bridge.apk
          if [ -d app/build/windows/x64/runner/Release ]; then
            cp -R app/build/windows/x64/runner/Release/. release-artifacts/windows/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-release-artifacts
          path: release-artifacts/
